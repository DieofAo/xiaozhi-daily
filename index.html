<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔬 小小志科研知识库 — Boss Team Research</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-card: #ffffff;
            --bg-hover: #f3f4f6;
            --border: #e5e7eb;
            --border-hover: #2563eb;
            --text: #1a1a2e;
            --text-dim: #4a4a6a;
            --text-muted: #9ca3af;
            --accent: #2563eb;
            --accent-light: #1d4ed8;
            --accent-bg: rgba(37,99,235,0.05);
            --accent-border: rgba(37,99,235,0.15);
            --green: #059669;
            --yellow: #d97706;
            --red: #dc2626;
            --radius: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            line-height: 1.8;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ===== Layout ===== */
        .app {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 272px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 24px 20px 18px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .sidebar-nav {
            padding: 10px 10px;
        }
        .nav-section {
            margin-bottom: 6px;
        }
        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 10px 10px 6px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 14px;
            color: var(--text-dim);
            user-select: none;
            border: 1px solid transparent;
        }
        .nav-item:hover {
            background: var(--bg-secondary);
            color: var(--text);
        }
        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            border-color: var(--accent-border);
            font-weight: 500;
        }
        .nav-item .icon {
            font-size: 15px;
            width: 20px;
            text-align: center;
        }
        .nav-item .count {
            margin-left: auto;
            font-size: 11px;
            background: var(--bg-secondary);
            padding: 1px 8px;
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .nav-item.active .count {
            background: rgba(37,99,235,0.1);
            color: var(--accent);
        }

        /* Main Content */
        .main {
            margin-left: 272px;
            flex: 1;
            min-height: 100vh;
        }

        /* Top Bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .topbar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }
        .search-box {
            flex: 1;
            max-width: 460px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        .search-box .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-muted);
        }
        .search-box .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            display: none;
            padding: 2px 4px;
        }
        .search-box .clear-btn.visible {
            display: block;
        }
        .topbar .stats-badge {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }

        /* Content area */
        .content {
            padding: 28px 40px;
        }

        /* Date Header */
        .date-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            margin-top: 8px;
        }
        .date-header:not(:first-child) {
            margin-top: 40px;
        }
        .date-badge {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--accent) 0%, #3b82f6 100%);
            padding: 5px 16px;
            border-radius: 20px;
        }
        .date-badge.today {
            background: linear-gradient(135deg, var(--green) 0%, #10b981 100%);
        }
        .date-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .date-count {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Section Title */
        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 28px 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .icon { font-size: 16px; }

        /* Paper Card */
        .paper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 26px;
            margin-bottom: 14px;
            transition: all 0.2s ease;
            cursor: default;
            box-shadow: var(--shadow-sm);
        }
        .paper:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .paper.highlight {
            background: linear-gradient(135deg, rgba(37,99,235,0.03) 0%, rgba(5,150,105,0.02) 100%);
            border-left: 3px solid var(--accent);
        }
        .paper h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            line-height: 1.55;
        }
        .paper .venue {
            font-size: 12.5px;
            color: var(--accent);
            margin-bottom: 12px;
            font-weight: 500;
        }
        .paper .summary {
            font-size: 14.5px;
            color: var(--text-dim);
            line-height: 1.85;
            margin-bottom: 14px;
            letter-spacing: 0.01em;
        }
        .paper .summary mark {
            background: rgba(245,158,11,0.18);
            color: #92400e;
            padding: 1px 4px;
            border-radius: 3px;
        }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 9px;
            border-radius: 4px;
            font-weight: 500;
        }
        .tag-green { color: var(--green); background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.18); }
        .tag-yellow { color: var(--yellow); background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.18); }
        .tag-red { color: var(--red); background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.15); }
        .tag-blue { color: #2563eb; background: rgba(37,99,235,0.06); border: 1px solid rgba(37,99,235,0.15); }
        .tag-purple { color: #475569; background: rgba(71,85,105,0.06); border: 1px solid rgba(71,85,105,0.15); }

        .links { display: flex; gap: 8px; flex-wrap: wrap; }
        .links a {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12.5px;
            color: var(--accent);
            text-decoration: none;
            padding: 5px 13px;
            border-radius: 6px;
            background: var(--accent-bg);
            border: 1px solid var(--accent-border);
            transition: all 0.15s ease;
            font-weight: 500;
        }
        .links a:hover {
            background: rgba(37,99,235,0.1);
            border-color: rgba(37,99,235,0.25);
        }
        .links a.industry-link {
            color: var(--yellow);
            background: rgba(217,119,6,0.06);
            border-color: rgba(217,119,6,0.15);
        }
        .links a.industry-link:hover {
            background: rgba(217,119,6,0.12);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 32px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-dim); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* Mobile hamburger */
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 99;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        /* Keyboard shortcut hint */
        .kbd-hint {
            font-size: 11px;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-secondary);
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }
        .search-box input:focus ~ .kbd-hint,
        .search-box .clear-btn.visible ~ .kbd-hint {
            display: none;
        }

        /* Stats overview */
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin-bottom: 32px;
        }
        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .overview-card .num {
            font-size: 30px;
            font-weight: 700;
            color: var(--accent);
        }
        .overview-card .label {
            font-size: 12.5px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Daily Overview / 今日必看 */
        .daily-overview {
            background: linear-gradient(135deg, rgba(251,146,60,0.06) 0%, rgba(129,140,248,0.06) 100%);
            border: 1px solid rgba(251,146,60,0.2);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .daily-overview::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #fb923c, #818cf8);
            border-radius: 4px 0 0 4px;
        }
        .daily-overview .ov-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .daily-overview .ov-badge {
            background: linear-gradient(135deg, #fb923c, #f472b6);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 6px;
            letter-spacing: 0.05em;
        }
        .daily-overview .ov-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .daily-overview .ov-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 16px;
            padding-left: 2px;
        }
        .daily-overview .ov-picks {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .daily-overview .ov-pick {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .daily-overview .ov-pick:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
            transform: translateX(2px);
        }
        .daily-overview .ov-pick-idx {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: rgba(129,140,248,0.12);
            color: var(--accent);
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .daily-overview .ov-pick-content {
            flex: 1;
            min-width: 0;
        }
        .daily-overview .ov-pick-title {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.5;
        }
        .daily-overview .ov-pick-tags {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .daily-overview .ov-stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .daily-overview .ov-stat {
            font-size: 12px;
            color: var(--text-dim);
        }
        .daily-overview .ov-stat strong {
            color: var(--accent);
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .sidebar-overlay.open {
                display: block;
            }
            .main {
                margin-left: 0;
            }
            .hamburger {
                display: block;
            }
            .content {
                padding: 20px 16px;
            }
            .topbar {
                padding: 12px 16px;
            }
            .overview-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Fade-in animation */
        .paper {
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .paper:nth-child(1) { animation-delay: 0s; }
        .paper:nth-child(2) { animation-delay: 0.04s; }
        .paper:nth-child(3) { animation-delay: 0.08s; }
        .paper:nth-child(4) { animation-delay: 0.12s; }
        .paper:nth-child(5) { animation-delay: 0.16s; }
        .paper:nth-child(6) { animation-delay: 0.2s; }
        .paper:nth-child(7) { animation-delay: 0.24s; }
        .paper:nth-child(8) { animation-delay: 0.28s; }
    </style>
</head>

    <aside class="sidebar" id="sidebar">

    <!-- Main -->
    <div class="main">

        <div class="content" id="content">

    </div>
</div>

document.addEventListener("DOMContentLoaded", () => {
    renderSidebar();
    renderView();
    setupSearch();
    setupKeyboard();
    updateStatsBadge();
});

// ===== SIDEBAR =====
function renderSidebar() {
    const nav = document.getElementById("sidebarNav");
    let html = "";

    // Quick access
    html += `<div class="nav-section">
        <div class="nav-section-title">快速访问</div>
        <div class="nav-item ${currentView==='latest'?'active':''}" onclick="setView('latest')">
            <span class="icon">⚡</span> 最新日报
            <span class="count">${getDatePapers(allDates[0]).length}</span>
        </div>
        <div class="nav-item ${currentView==='all'?'active':''}" onclick="setView('all')">
            <span class="icon">📚</span> 全部内容
            <span class="count">${PAPERS_DB.length}</span>
        </div>
    </div>`;

    // By category (领域在前)
    html += `<div class="nav-section">
        <div class="nav-section-title">按领域</div>`;
    categoryOrder.forEach(cat => {
        const papers = PAPERS_DB.filter(p => p.category === cat);
        if (papers.length === 0) return;
        const icon = papers[0].categoryIcon;
        const active = currentView === `category:${cat}`;
        html += `<div class="nav-item ${active?'active':''}" onclick="setView('category:${cat}')">
            <span class="icon">${icon}</span> ${cat}
            <span class="count">${papers.length}</span>
        </div>`;
    });
    html += `</div>`;

    // By date (日期在后)
    html += `<div class="nav-section">
        <div class="nav-section-title">按日期</div>`;
    allDates.forEach(d => {
        const papers = getDatePapers(d);
        const isToday = d === allDates[0];
        const label = formatDateLabel(d);
        const active = currentView === `date:${d}`;
        html += `<div class="nav-item ${active?'active':''}" onclick="setView('date:${d}')">
            <span class="icon">${isToday?'🟢':'📅'}</span> ${label}
            <span class="count">${papers.length}</span>
        </div>`;
    });
    html += `</div>`;

    nav.innerHTML = html;
}

// ===== VIEWS =====
function setView(view) {
    currentView = view;
    searchQuery = "";
    document.getElementById("searchInput").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    renderSidebar();
    renderView();
    updateStatsBadge();
    // Close mobile sidebar
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarOverlay").classList.remove("open");
}

function renderView() {
    const content = document.getElementById("content");
    const title = document.getElementById("topbarTitle");

    if (searchQuery) {
        title.textContent = `搜索: "${searchQuery}"`;
        renderSearchResults(content);
        return;
    }

    switch (true) {
        case currentView === "latest":
            title.textContent = `🔬 最新日报 — ${formatDateLabel(allDates[0])}`;
            renderDateView(content, allDates[0], true);
            break;
        case currentView === "all":
            title.textContent = "📚 全部内容";
            renderAllView(content);
            break;
        case currentView.startsWith("date:"):
            const date = currentView.split(":")[1];
            title.textContent = `📅 ${formatDateLabel(date)}`;
            renderDateView(content, date, false);
            break;
        case currentView.startsWith("category:"):
            const cat = currentView.split(":").slice(1).join(":");
            title.textContent = `${PAPERS_DB.find(p=>p.category===cat)?.categoryIcon||'📂'} ${cat}`;
            renderCategoryView(content, cat);
            break;
    }
}

function renderDailyOverview(date, papers) {
    // 获取 DAILY_OVERVIEW 数据（如果有）
    const ov = (typeof DAILY_OVERVIEW !== "undefined" && DAILY_OVERVIEW[date]) ? DAILY_OVERVIEW[date] : null;

    // 精选论文列表：优先用 DAILY_OVERVIEW.picks，其次用 highlight 标记，最后用 VLA/Robotics/WM 分类自动选
    let pickPapers = [];
    if (ov && ov.picks && ov.picks.length > 0) {
        // 按 picks 标题匹配论文
        ov.picks.forEach(title => {
            const found = papers.find(p => p.title === title);
            if (found) pickPapers.push(found);
        });
    }
    if (pickPapers.length === 0) {
        // fallback: highlight 论文
        pickPapers = papers.filter(p => p.highlight);
    }
    if (pickPapers.length === 0) {
        // fallback: 基于特征热度评分，不限分类不凑数
        const coreCats = new Set(["VLA", "World Model", "Robotics", "Embodied AI", "RL"]);
        const scored = papers
            .filter(p => p.category !== "Informations")
            .map(p => {
                let score = 0;
                // 链接数量反映资源丰富度（代码/项目/模型）
                score += Math.min((p.links || []).length, 5) * 6;
                // 核心分类加权
                if (coreCats.has(p.category)) score += 5;
                // 有 highlight 标记
                if (p.highlight) score += 20;
                return { paper: p, score };
            })
            .filter(x => x.score > 0)
            .sort((a, b) => b.score - a.score)
            .slice(0, 5)
            .map(x => x.paper);
        pickPapers = scored;
    }
    if (pickPapers.length === 0) {
        // 完全没有可精选的内容，不渲染 overview
        return "";
    }

    // banner 标题和副标题
    const bannerTitle = (ov && ov.bannerTitle) ? ov.bannerTitle : "今日精选";
    const bannerSubtitle = (ov && ov.bannerSubtitle) ? ov.bannerSubtitle : "";

    // 统计
    const totalPapers = (ov && ov.totalPapers) ? ov.totalPapers : papers.filter(p => p.category !== "Informations").length;
    const totalNews = (ov && ov.totalNews) ? ov.totalNews : papers.filter(p => p.category === "Informations").length;

    let picksHtml = "";
    pickPapers.forEach((p, i) => {
        const tagsHtml = p.tags.map(([label]) => {
            return `<span class="tag tag-green" style="font-size:11px;padding:1px 7px;">${label}</span>`;
        }).join("");
        picksHtml += `<div class="ov-pick" onclick="document.querySelector('h3')&&Array.from(document.querySelectorAll('.paper h3,.paper.highlight h3')).find(el=>el.textContent.includes('${p.title.substring(0,30).replace(/'/g,"\\'")}'))?.scrollIntoView({behavior:'smooth',block:'center'})">
            <div class="ov-pick-idx">${i + 1}</div>
            <div class="ov-pick-content">
                <div class="ov-pick-title">${p.title}</div>
                <div class="ov-pick-tags">${tagsHtml}</div>
            </div>
        </div>`;
    });

    let subtitleHtml = bannerSubtitle ? `<div class="ov-subtitle">${bannerSubtitle}</div>` : "";

    let statsHtml = `<div class="ov-stats">
        <div class="ov-stat"><strong>${totalPapers}</strong> 篇论文</div>
        <div class="ov-stat"><strong>${totalNews}</strong> 条资讯</div>
        <div class="ov-stat"><strong>${pickPapers.length}</strong> 篇精选</div>
    </div>`;

    return `<div class="daily-overview">
        <div class="ov-header">
            <div class="ov-badge">TODAY'S PICKS</div>
            <div class="ov-title">${bannerTitle}</div>
        </div>
        ${subtitleHtml}
        <div class="ov-picks">${picksHtml}</div>
        ${statsHtml}
    </div>`;
}

function renderDateView(container, date, showOverview) {
    const papers = getDatePapers(date);
    let html = "";

    if (showOverview) {
        html += `<div class="overview-cards">
            <div class="overview-card"><div class="num">${PAPERS_DB.length}</div><div class="label">总收录论文</div></div>
            <div class="overview-card"><div class="num">${allDates.length}</div><div class="label">累计天数</div></div>
            <div class="overview-card"><div class="num">${allCategories.length}</div><div class="label">覆盖领域</div></div>
            <div class="overview-card"><div class="num">${papers.length}</div><div class="label">今日新增</div></div>
        </div>`;
    }

    // Daily Overview 精选模块
    html += renderDailyOverview(date, papers);

    // Group by category
    const grouped = groupByCategory(papers);
    categoryOrder.forEach(cat => {
        if (!grouped[cat]) return;
        html += renderSectionTitle(cat, grouped[cat][0].categoryIcon, grouped[cat].length);
        grouped[cat].forEach(p => html += renderPaperCard(p));
    });
    // Render any categories not in categoryOrder (fallback)
    Object.keys(grouped).forEach(cat => {
        if (categoryOrder.includes(cat)) return;
        html += renderSectionTitle(cat, grouped[cat][0].categoryIcon, grouped[cat].length);
        grouped[cat].forEach(p => html += renderPaperCard(p));
    });

    container.innerHTML = html;
}

function renderAllView(container) {
    let html = `<div class="overview-cards">
        <div class="overview-card"><div class="num">${PAPERS_DB.length}</div><div class="label">总收录论文</div></div>
        <div class="overview-card"><div class="num">${allDates.length}</div><div class="label">累计天数</div></div>
        <div class="overview-card"><div class="num">${allCategories.length}</div><div class="label">覆盖领域</div></div>
        <div class="overview-card"><div class="num">${PAPERS_DB.filter(p=>p.highlight).length}</div><div class="label">重磅论文</div></div>
    </div>`;

    // 按类别分组，每个类别内按日期倒序（由近到远）
    categoryOrder.forEach(cat => {
        const catPapers = PAPERS_DB.filter(p => p.category === cat);
        if (catPapers.length === 0) return;
        // 按日期倒序排列
        catPapers.sort((a, b) => b.date.localeCompare(a.date));
        const icon = catPapers[0].categoryIcon;
        html += renderSectionTitle(cat, icon, catPapers.length);
        catPapers.forEach(p => html += renderPaperCard(p));
    });
    // Render any categories not in categoryOrder (fallback)
    const knownCats = new Set(categoryOrder);
    const extraCats = [...new Set(PAPERS_DB.map(p => p.category))].filter(c => !knownCats.has(c));
    extraCats.forEach(cat => {
        const catPapers = PAPERS_DB.filter(p => p.category === cat);
        if (catPapers.length === 0) return;
        catPapers.sort((a, b) => b.date.localeCompare(a.date));
        const icon = catPapers[0].categoryIcon;
        html += renderSectionTitle(cat, icon, catPapers.length);
        catPapers.forEach(p => html += renderPaperCard(p));
    });

    container.innerHTML = html;
}

function renderCategoryView(container, category) {
    const papers = PAPERS_DB.filter(p => p.category === category);
    let html = `<div class="overview-cards">
        <div class="overview-card"><div class="num">${papers.length}</div><div class="label">该领域论文</div></div>
        <div class="overview-card"><div class="num">${[...new Set(papers.map(p=>p.date))].length}</div><div class="label">涉及天数</div></div>
        <div class="overview-card"><div class="num">${papers.filter(p=>p.highlight).length}</div><div class="label">重磅论文</div></div>
    </div>`;

    // Group by date
    allDates.forEach(date => {
        const datePapers = papers.filter(p => p.date === date);
        if (datePapers.length === 0) return;
        const isToday = date === allDates[0];
        html += `<div class="date-header">
            <div class="date-badge ${isToday?'today':''}">${formatDateLabel(date)}</div>
            <div class="date-line"></div>
            <div class="date-count">${datePapers.length} 篇</div>
        </div>`;
        datePapers.forEach(p => html += renderPaperCard(p));
    });

    container.innerHTML = html;
}

function renderSearchResults(container) {
    const q = searchQuery.toLowerCase();
    const results = PAPERS_DB.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.summary.toLowerCase().includes(q) ||
        p.category.toLowerCase().includes(q) ||
        p.venue.toLowerCase().includes(q) ||
        p.tags.some(t => t[0].toLowerCase().includes(q))
    );

    if (results.length === 0) {
        container.innerHTML = `<div class="empty-state">
            <div class="icon">🔍</div>
            <h3>没有找到匹配的结果</h3>
            <p>试试其他关键词，如 "VLA"、"world model"、"抓取"、"RL"</p>
        </div>`;
        return;
    }

    let html = `<div style="margin-bottom:20px;font-size:14px;color:var(--text-dim)">
        找到 <strong style="color:var(--accent)">${results.length}</strong> 条匹配结果
    </div>`;

    // Group by date
    const dateGroups = {};
    results.forEach(p => {
        if (!dateGroups[p.date]) dateGroups[p.date] = [];
        dateGroups[p.date].push(p);
    });

    Object.keys(dateGroups).sort().reverse().forEach(date => {
        const isToday = date === allDates[0];
        html += `<div class="date-header">
            <div class="date-badge ${isToday?'today':''}">${formatDateLabel(date)}</div>
            <div class="date-line"></div>
            <div class="date-count">${dateGroups[date].length} 篇</div>
        </div>`;
        dateGroups[date].forEach(p => html += renderPaperCard(p, q));
    });

    container.innerHTML = html;
}

// ===== RENDER HELPERS =====
function renderSectionTitle(cat, icon, count) {
    return `<div class="section-title">
        <span class="icon">${icon}</span> ${cat}
        <span style="margin-left:auto;font-size:11px;color:var(--text-muted);letter-spacing:0;text-transform:none">${count} 篇</span>
    </div>`;
}

function renderPaperCard(paper, highlightQuery) {
    const cls = paper.highlight ? "paper highlight" : "paper";
    let summary = paper.summary;
    let title = paper.title;

    if (highlightQuery) {
        const re = new RegExp(`(${escapeRegex(highlightQuery)})`, "gi");
        summary = summary.replace(re, "<mark>$1</mark>");
        title = title.replace(re, "<mark>$1</mark>");
    }

    const tagsHtml = paper.tags.map(([label, color]) => {
        const cls = color === "red" ? "tag-red" : color === "yellow" ? "tag-yellow" : color === "blue" ? "tag-blue" : color === "purple" ? "tag-purple" : "tag-green";
        return `<span class="tag ${cls}">${label}</span>`;
    }).join("");

    const linksHtml = paper.links.map(([label, url]) => {
        const cls = paper.isIndustry ? 'class="industry-link"' : '';
        return `<a href="${url}" target="_blank" ${cls}>${label}</a>`;
    }).join("");

    return `<div class="${cls}">
        <div class="tags">${tagsHtml}</div>
        <h3>${title}</h3>
        <div class="venue">${paper.venue}</div>
        <div class="summary">${summary}</div>
        <div class="links">${linksHtml}</div>
    </div>`;
}

// ===== SEARCH =====
function setupSearch() {
    const input = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    let debounceTimer;

    input.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        const val = input.value.trim();
        clearBtn.classList.toggle("visible", val.length > 0);

        debounceTimer = setTimeout(() => {
            if (val.length > 0) {
                searchQuery = val;
                currentView = "search";
                renderSidebar();
                renderView();
                updateStatsBadge();
            } else if (searchQuery) {
                searchQuery = "";
                currentView = "latest";
                renderSidebar();
                renderView();
                updateStatsBadge();
            }
        }, 250);
    });
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    searchQuery = "";
    currentView = "latest";
    renderSidebar();
    renderView();
    updateStatsBadge();
    document.getElementById("searchInput").focus();
}

function setupKeyboard() {
    document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
            e.preventDefault();
            document.getElementById("searchInput").focus();
        }
        if (e.key === "Escape") {
            document.getElementById("searchInput").blur();
            if (searchQuery) clearSearch();
        }
    });
}

// ===== UTILS =====
function getDatePapers(date) {
    return PAPERS_DB.filter(p => p.date === date);
}

function groupByCategory(papers) {
    const groups = {};
    papers.forEach(p => {
        if (!groups[p.category]) groups[p.category] = [];
        groups[p.category].push(p);
    });
    return groups;
}

function formatDateLabel(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    const weekdays = ["日","一","二","三","四","五","六"];
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = weekdays[d.getDay()];
    if (dateStr === allDates[0]) return `${m}/${day}（周${w}）· 最新`;
    return `${m}/${day}（周${w}）`;
}

function updateStatsBadge() {
    const badge = document.getElementById("statsBadge");
    if (searchQuery) {
        const count = PAPERS_DB.filter(p =>
            p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
            p.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
            p.category.toLowerCase().includes(searchQuery.toLowerCase()) ||
            p.tags.some(t => t[0].toLowerCase().includes(searchQuery.toLowerCase()))
        ).length;
        badge.textContent = `${count} 条结果`;
    } else {
        badge.textContent = `共 ${PAPERS_DB.length} 篇 · ${allDates.length} 天`;
    }
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebarOverlay").classList.toggle("open");
}
</script>
