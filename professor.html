<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Professor 知识库 — Boss Team Research</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-card: #ffffff;
            --bg-hover: #f3f4f6;
            --border: #e5e7eb;
            --border-hover: #0d9488;
            --text: #1a1a2e;
            --text-dim: #4a4a6a;
            --text-muted: #9ca3af;
            --accent: #0d9488;
            --accent-light: #0f766e;
            --accent-bg: rgba(13,148,136,0.05);
            --accent-border: rgba(13,148,136,0.15);
            --green: #059669;
            --yellow: #d97706;
            --red: #dc2626;
            --radius: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            line-height: 1.8;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .app { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 24px 20px 18px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .sidebar-nav { padding: 10px; }
        .nav-section { margin-bottom: 6px; }
        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 10px 10px 6px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 14px;
            color: var(--text-dim);
            user-select: none;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: var(--bg-secondary); color: var(--text); }
        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            border-color: var(--accent-border);
            font-weight: 500;
        }
        .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
        .nav-item .count {
            margin-left: auto;
            font-size: 11px;
            background: var(--bg-secondary);
            padding: 1px 8px;
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .nav-item.active .count {
            background: rgba(13,148,136,0.1);
            color: var(--accent);
        }

        /* Main */
        .main { margin-left: 280px; flex: 1; min-height: 100vh; }

        /* Topbar */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .topbar-title { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; }
        .search-box { flex: 1; max-width: 460px; position: relative; }
        .search-box input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            font-size: 14px; color: var(--text-muted);
        }
        .search-box .clear-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 16px; display: none; padding: 2px 4px;
        }
        .search-box .clear-btn.visible { display: block; }
        .stats-badge {
            font-size: 12px; color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .kbd-hint {
            font-size: 11px; color: var(--text-muted);
            border: 1px solid var(--border); padding: 2px 6px;
            border-radius: 4px; background: var(--bg-secondary);
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        }
        .search-box input:focus ~ .kbd-hint,
        .search-box .clear-btn.visible ~ .kbd-hint { display: none; }

        /* Content */
        .content { padding: 28px 40px; }

        /* Overview cards */
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px; margin-bottom: 32px;
        }
        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px; text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .overview-card .num { font-size: 30px; font-weight: 700; color: var(--accent); }
        .overview-card .label { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }

        /* Section title */
        .section-title {
            font-size: 12px; font-weight: 600; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 28px 0 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title .icon { font-size: 16px; }

        /* Paper card */
        .paper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 26px; margin-bottom: 14px;
            transition: all 0.2s ease;
            cursor: default;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }
        .paper:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .paper.highlight {
            background: linear-gradient(135deg, rgba(13,148,136,0.03) 0%, rgba(5,150,105,0.02) 100%);
            border-left: 3px solid var(--accent);
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .paper:nth-child(1) { animation-delay: 0s; }
        .paper:nth-child(2) { animation-delay: 0.04s; }
        .paper:nth-child(3) { animation-delay: 0.08s; }
        .paper:nth-child(4) { animation-delay: 0.12s; }
        .paper:nth-child(5) { animation-delay: 0.16s; }

        .paper h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.55; }
        .paper .venue { font-size: 12.5px; color: var(--accent); margin-bottom: 8px; font-weight: 500; }
        .paper .meta-row {
            display: flex; gap: 12px; flex-wrap: wrap;
            font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
        }
        .paper .meta-row span { display: flex; align-items: center; gap: 4px; }

        /* Innovation points */
        .innovations {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 14px;
        }
        .innovations-title {
            font-size: 12px; font-weight: 600; color: var(--accent);
            margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
        }
        .innovations ul {
            list-style: none; padding: 0;
        }
        .innovations li {
            font-size: 14px; color: var(--text-dim);
            line-height: 1.75; padding: 3px 0;
            padding-left: 18px; position: relative;
        }
        .innovations li::before {
            content: "▸"; position: absolute; left: 0;
            color: var(--accent); font-weight: bold;
        }

        .paper .summary {
            font-size: 14.5px; color: var(--text-dim);
            line-height: 1.85; margin-bottom: 14px;
        }
        .paper .summary mark {
            background: rgba(245,158,11,0.18);
            color: #92400e; padding: 1px 4px; border-radius: 3px;
        }

        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            display: inline-block; font-size: 11px;
            padding: 2px 9px; border-radius: 4px; font-weight: 500;
        }
        .tag-green { color: var(--green); background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.18); }
        .tag-yellow { color: var(--yellow); background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.18); }
        .tag-red { color: var(--red); background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.15); }
        .tag-blue { color: #2563eb; background: rgba(37,99,235,0.06); border: 1px solid rgba(37,99,235,0.15); }
        .tag-teal { color: var(--accent); background: var(--accent-bg); border: 1px solid var(--accent-border); }

        .links { display: flex; gap: 8px; flex-wrap: wrap; }
        .links a {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12.5px; color: var(--accent); text-decoration: none;
            padding: 5px 13px; border-radius: 6px;
            background: var(--accent-bg);
            border: 1px solid var(--accent-border);
            transition: all 0.15s ease; font-weight: 500;
        }
        .links a:hover {
            background: rgba(13,148,136,0.1);
            border-color: rgba(13,148,136,0.25);
        }

        /* Empty state */
        .empty-state { text-align: center; padding: 80px 32px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-dim); margin-bottom: 8px; }

        /* Top Tabs */
        .top-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
        }
        .top-tab {
            padding: 12px 28px;
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-tab:hover { color: var(--text-dim); }
        .top-tab.active-papers {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .top-tab.active-ideas {
            color: #7c3aed;
            border-bottom-color: #7c3aed;
        }
        .top-tab .tab-count {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .top-tab.active-papers .tab-count {
            background: rgba(13,148,136,0.1);
            color: var(--accent);
        }
        .top-tab.active-ideas .tab-count {
            background: rgba(124,58,237,0.1);
            color: #7c3aed;
        }

        /* Idea card */
        .idea {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 26px; margin-bottom: 14px;
            transition: all 0.2s ease;
            cursor: default;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            border-left: 3px solid #7c3aed;
        }
        .idea:hover {
            border-color: #7c3aed;
            border-left-color: #7c3aed;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .idea:nth-child(1) { animation-delay: 0s; }
        .idea:nth-child(2) { animation-delay: 0.04s; }
        .idea:nth-child(3) { animation-delay: 0.08s; }

        .idea h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.55; }
        .idea .idea-meta {
            display: flex; gap: 12px; flex-wrap: wrap;
            font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
        }
        .idea .idea-meta span { display: flex; align-items: center; gap: 4px; }
        .idea .idea-content {
            font-size: 14.5px; color: var(--text-dim);
            line-height: 1.85; margin-bottom: 14px;
        }
        .idea .idea-content mark {
            background: rgba(124,58,237,0.12);
            color: #5b21b6; padding: 1px 4px; border-radius: 3px;
        }

        /* Idea status badge */
        .idea-status {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 600;
            padding: 3px 12px; border-radius: 20px;
            margin-bottom: 10px;
        }
        .idea-status-new { background: rgba(124,58,237,0.08); color: #7c3aed; border: 1px solid rgba(124,58,237,0.2); }
        .idea-status-exploring { background: rgba(37,99,235,0.08); color: #2563eb; border: 1px solid rgba(37,99,235,0.2); }
        .idea-status-validated { background: rgba(5,150,105,0.08); color: #059669; border: 1px solid rgba(5,150,105,0.2); }
        .idea-status-abandoned { background: rgba(107,114,128,0.08); color: #6b7280; border: 1px solid rgba(107,114,128,0.2); }

        /* Idea source box */
        .idea-source {
            background: rgba(124,58,237,0.04);
            border: 1px solid rgba(124,58,237,0.12);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 14px;
        }
        .idea-source-title {
            font-size: 12px; font-weight: 600; color: #7c3aed;
            margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
        }
        .idea-source-item {
            font-size: 13.5px; color: var(--text-dim);
            line-height: 1.7; padding: 2px 0;
        }
        .idea-source-item a {
            color: #7c3aed; text-decoration: none;
            border-bottom: 1px dashed rgba(124,58,237,0.3);
        }
        .idea-source-item a:hover { border-bottom-color: #7c3aed; }

        /* Idea tags — purple scheme */
        .tag-purple { color: #7c3aed; background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.15); }
        .tag-indigo { color: #4f46e5; background: rgba(79,70,229,0.06); border: 1px solid rgba(79,70,229,0.15); }

        /* Ideas overview accent override */
        .ideas-accent .overview-card .num { color: #7c3aed; }

        /* Mobile */
        .hamburger {
            display: none; background: none; border: none;
            color: var(--text); font-size: 22px; cursor: pointer; padding: 4px;
        }
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); z-index: 99;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main { margin-left: 0; }
            .hamburger { display: block; }
            .content { padding: 20px 16px; }
            .topbar { padding: 12px 16px; }
            .overview-cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>🎓 Professor</h1>
            <div class="subtitle">Boss Team · 论文精读 · 灵感库</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <div class="main">
        <div class="topbar">
            <button class="hamburger" onclick="toggleSidebar()">☰</button>
            <div class="topbar-title" id="topbarTitle">知识库概览</div>
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索论文、灵感、标签..." autocomplete="off">
                <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
                <span class="kbd-hint">⌘K</span>
            </div>
            <div class="stats-badge" id="statsBadge"></div>
        </div>
        <div class="content" id="content"></div>
    </div>
</div>

<script>
// ===== Professor 论文知识库数据 =====
const PAPERS_DB = [
    {
        id: "forcevla2",
        date: "2026-03-18",
        addedDate: "2026-03-18",
        category: "VLA",
        categoryIcon: "🧠",
        title: "ForceVLA2: Unleashing Hybrid Force-Position Control with Force Awareness for Contact-Rich Manipulation",
        venue: "CVPR 2026 · arXiv 2603.15169",
        authors: "Yang Li, Zhaxizhuoma, Hongru Jiang, Junjie Xia et al.",
        institutions: "复旦大学, 上海交大, 新加坡国立大学, 上海大学, 西交大, 中关村学院, Lumos Robotics",
        summary: "首个在 VLA 框架中实现端到端混合力-位控制的模型。解决了具身智能在接触丰富操作中仅依赖位置控制、缺乏力感知的根本问题，在擦拭、按压、装配等任务中大幅超越 π0 和 π0.5。",
        innovations: [
            "显式力感知突破位置控制局限：首次在 VLA 中引入显式力感知和混合力-位控制，让机器人在接触丰富任务中不再「蛮干」",
            "力提示词 + 跨尺度 MoE 架构：VLM 专家端引入「基于力的提示词」建立力感知任务概念；动作专家端设计 Cross-scale MoE 将概念与实时力信号自适应融合",
            "闭环混合力-位控制：根据实时接触力信号做闭环调节——接触力太大就退让、太小就加压，非预设固定策略"
        ],
        results: "5 个接触丰富任务上 vs π0 +48.0%，vs π0.5 +35.0%；有效缓解手臂过载和接触不稳定",
        dataset: "ForceVLA2-Dataset：5 种任务、1000 条轨迹，含多视角图像 + 力信号 + 本体感知",
        tags: [["CVPR 2026","red"],["Force Control","green"],["MoE","green"],["Contact-Rich","blue"]],
        links: [["📄 arXiv","https://arxiv.org/abs/2603.15169"],["📑 PDF","https://arxiv.org/pdf/2603.15169"],["🌐 项目主页","https://sites.google.com/view/force-vla2/home"]],
        highlight: true,
        bossNotes: "与 FACTO 零空间投影的约束控制思路互补——ForceVLA2 走端到端力感知，FACTO 走几何约束投影"
    },
    {
        id: "pi-rlt",
        date: "2026-03-19",
        addedDate: "2026-03-21",
        category: "Robotics",
        categoryIcon: "🦾",
        title: "Precise Manipulation with Efficient Online RL (RLT)",
        venue: "Physical Intelligence (π) · 2026-03-19",
        authors: "Charles Xu, Jost Tobias Springenberg, Michael Equi, Ali Amin, Adnan Esmail, Sergey Levine, Liyiming Ke",
        institutions: "Physical Intelligence (π)",
        summary: "将大型 VLA 模型（如 π₀）的表征能力与高效在线 RL 相结合，通过「RL Tokens」压缩表示 + 极小 Actor-Critic 网络，在真实机器人上仅用分钟级数据实现精细操作的大幅提升，无需微调整个大型网络。专注解决高精度、灵巧度和速度要求极高的「最后一毫米」关键阶段。",
        innovations: [
            "RL Token 信息瓶颈：在预训练 VLA 上添加编码器-解码器 Transformer，通过信息瓶颈生成压缩的 RL Token 表示，冻结后作为下游 RL 策略的紧凑输入",
            "轻量级板载实时学习：极小的 Actor + Critic 网络以 RL Token 为输入，支持机器人板载每秒数百次更新，实现真正的在线实时适应",
            "参考动作正则化：Actor 接收 VLA 预测动作作为输入，学习「编辑」而非替换原始策略，保持接近 VLA 行为并仅在发现更优替代时偏离",
            "极致数据效率：以太网插入任务仅用 15 分钟机器人数据即实现显著提升，螺丝拧紧等任务提升约 3 倍吞吐量"
        ],
        results: "电动螺丝刀 ~3x 提升 · 扎带 ~2x · 以太网插接 ~2.3x · 电源线插接 ~1.8x；RLT 中位 66 步 vs 人类遥操作 146 步 vs 基础模型 228 步，速度超越人类演示",
        dataset: "四项高难度精细操作任务（M3 螺丝亚毫米精度、扎带、以太网线、电源线），仅需分钟到小时级真实世界数据",
        tags: [["Physical Intelligence","red"],["Robotics","green"],["VLA","green"],["RL","blue"],["Online Learning","teal"]],

    "new": { label: "💡 New", cls: "idea-status-new" },

// ===== 衍生数据 =====
const allDates = [...new Set(PAPERS_DB.map(p => p.addedDate))].sort().reverse();
const allCategories = [...new Set(PAPERS_DB.map(p => p.category))];

// ===== 状态 =====
let activeTab = "papers"; // "papers" or "ideas"
let currentView = "overview";
let searchQuery = "";

// ===== 初始化 =====
document.addEventListener("DOMContentLoaded", () => {
    renderSidebar();
    renderView();

// ===== Tab 切换 =====
function switchTab(tab) {
    activeTab = tab;
    currentView = "overview";
    searchQuery = "";
    document.getElementById("searchInput").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    renderSidebar();
    renderView();
    updateStatsBadge();
}

// ===== 侧边栏 =====
function renderSidebar() {
    const nav = document.getElementById("sidebarNav");
    let html = "";

    if (activeTab === "papers") {
        html += `<div class="nav-section">
            <div class="nav-section-title">快速访问</div>
            <div class="nav-item ${currentView==='overview'?'active':''}" onclick="setView('overview')">
                <span class="icon">📊</span> 知识库概览
                <span class="count">${PAPERS_DB.length}</span>
            </div>
            <div class="nav-item ${currentView==='all'?'active':''}" onclick="setView('all')">
                <span class="icon">📚</span> 全部论文
                <span class="count">${PAPERS_DB.length}</span>
            </div>
        </div>`;

        html += `<div class="nav-section">
            <div class="nav-section-title">按领域</div>`;
        categoryOrder.forEach(cat => {
            const papers = PAPERS_DB.filter(p => p.category === cat);
            if (papers.length === 0) return;
            const icon = papers[0].categoryIcon;
            const active = currentView === `category:${cat}`;
            html += `<div class="nav-item ${active?'active':''}" onclick="setView('category:${cat}')">
                <span class="icon">${icon}</span> ${cat}
                <span class="count">${papers.length}</span>
            </div>`;
        });
        html += `</div>`;

        html += `<div class="nav-section">
            <div class="nav-section-title">按收录日期</div>`;
        allDates.forEach(d => {
            const papers = PAPERS_DB.filter(p => p.addedDate === d);
            const isLatest = d === allDates[0];
            const label = formatDateLabel(d);
            const active = currentView === `date:${d}`;
            html += `<div class="nav-item ${active?'active':''}" onclick="setView('date:${d}')">
                <span class="icon">${isLatest?'🟢':'📅'}</span> ${label}
                <span class="count">${papers.length}</span>
            </div>`;
        });
        html += `</div>`;
    } else {
        // Ideas sidebar
        const ideaDates = [...new Set(IDEAS_DB.map(i => i.date))].sort().reverse();
        const statusCounts = {};
        IDEAS_DB.forEach(i => { statusCounts[i.status] = (statusCounts[i.status] || 0) + 1; });

        html += `<div class="nav-section">
            <div class="nav-section-title">快速访问</div>
            <div class="nav-item ${currentView==='overview'?'active':''}" onclick="setView('overview')">
                <span class="icon">✨</span> 灵感概览
                <span class="count">${IDEAS_DB.length}</span>
            </div>
            <div class="nav-item ${currentView==='all-ideas'?'active':''}" onclick="setView('all-ideas')">
                <span class="icon">💡</span> 全部灵感
                <span class="count">${IDEAS_DB.length}</span>
            </div>
        </div>`;

        html += `<div class="nav-section">
            <div class="nav-section-title">按状态</div>`;
        Object.entries(ideaStatusMap).forEach(([key, val]) => {
            const count = statusCounts[key] || 0;
            if (count === 0) return;
            const active = currentView === `idea-status:${key}`;
            html += `<div class="nav-item ${active?'active':''}" onclick="setView('idea-status:${key}')">
                <span class="icon">${val.label.split(' ')[0]}</span> ${val.label.split(' ').slice(1).join(' ')}
                <span class="count">${count}</span>
            </div>`;
        });
        html += `</div>`;

        html += `<div class="nav-section">
            <div class="nav-section-title">按日期</div>`;
        ideaDates.forEach(d => {
            const ideas = IDEAS_DB.filter(i => i.date === d);
            const label = formatDateLabel(d, true);
            const active = currentView === `idea-date:${d}`;
            html += `<div class="nav-item ${active?'active':''}" onclick="setView('idea-date:${d}')">
                <span class="icon">📅</span> ${label}
                <span class="count">${ideas.length}</span>
            </div>`;
        });
        html += `</div>`;
    }

    nav.innerHTML = html;
}

// ===== 视图切换 =====
function setView(view) {
    currentView = view;
    searchQuery = "";
    document.getElementById("searchInput").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    renderSidebar();
    renderView();
    updateStatsBadge();
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarOverlay").classList.remove("open");
}

function renderView() {
    const content = document.getElementById("content");
    const title = document.getElementById("topbarTitle");

    // Top tabs
    let tabsHtml = `<div class="top-tabs">
        <div class="top-tab ${activeTab==='papers'?'active-papers':''}" onclick="switchTab('papers')">
            📚 Papers
            <span class="tab-count">${PAPERS_DB.length}</span>
        </div>
        <div class="top-tab ${activeTab==='ideas'?'active-ideas':''}" onclick="switchTab('ideas')">
            💡 Ideas
            <span class="tab-count">${IDEAS_DB.length}</span>
        </div>
    </div>`;

    if (searchQuery) {
        title.textContent = `搜索: "${searchQuery}"`;
        if (activeTab === "papers") {
            content.innerHTML = tabsHtml + renderSearchResultsHtml();
        } else {
            content.innerHTML = tabsHtml + renderIdeaSearchResultsHtml();
        }
        return;
    }

    if (activeTab === "papers") {
        switch (true) {
            case currentView === "overview":
                title.textContent = "🎓 知识库概览";
                content.innerHTML = tabsHtml + renderPapersOverviewHtml();
                break;
            case currentView === "all":
                title.textContent = "📚 全部论文";
                content.innerHTML = tabsHtml + renderAllPapersHtml();
                break;
            case currentView.startsWith("date:"):
                const date = currentView.split(":")[1];
                title.textContent = `📅 ${formatDateLabel(date)}`;
                content.innerHTML = tabsHtml + renderDateViewHtml(date);
                break;
            case currentView.startsWith("category:"):
                const cat = currentView.split(":").slice(1).join(":");
                const icon = PAPERS_DB.find(p => p.category === cat)?.categoryIcon || '📂';
                title.textContent = `${icon} ${cat}`;
                content.innerHTML = tabsHtml + renderCategoryViewHtml(cat);
                break;
        }
    } else {
        switch (true) {
            case currentView === "overview":
                title.textContent = "✨ 灵感概览";
                content.innerHTML = tabsHtml + renderIdeasOverviewHtml();
                break;
            case currentView === "all-ideas":
                title.textContent = "💡 全部灵感";
                content.innerHTML = tabsHtml + renderAllIdeasHtml();
                break;
            case currentView.startsWith("idea-status:"):
                const status = currentView.split(":")[1];
                const statusInfo = ideaStatusMap[status];
                title.textContent = `${statusInfo.label}`;
                content.innerHTML = tabsHtml + renderIdeaStatusViewHtml(status);
                break;
            case currentView.startsWith("idea-date:"):
                const ideaDate = currentView.split(":")[1];
                title.textContent = `📅 ${formatDateLabel(ideaDate, true)}`;
                content.innerHTML = tabsHtml + renderIdeaDateViewHtml(ideaDate);
                break;
        }
    }
}

// ===== Papers 视图 =====
function renderPapersOverviewHtml() {
    let html = `<div class="overview-cards">
        <div class="overview-card"><div class="num">${PAPERS_DB.length}</div><div class="label">精读论文总数</div></div>
        <div class="overview-card"><div class="num">${allCategories.length}</div><div class="label">覆盖领域</div></div>
        <div class="overview-card"><div class="num">${PAPERS_DB.filter(p=>p.highlight).length}</div><div class="label">重磅论文</div></div>
        <div class="overview-card"><div class="num">${allDates.length}</div><div class="label">收录天数</div></div>
    </div>`;
    html += `<div class="section-title"><span class="icon">⚡</span> 最近收录</div>`;
    const recentPapers = [...PAPERS_DB].sort((a, b) => b.addedDate.localeCompare(a.addedDate)).slice(0, 5);
    recentPapers.forEach(p => html += renderPaperCard(p));
    return html;
}

function renderAllPapersHtml() {
    let html = `<div class="overview-cards">
        <div class="overview-card"><div class="num">${PAPERS_DB.length}</div><div class="label">精读论文总数</div></div>
        <div class="overview-card"><div class="num">${allCategories.length}</div><div class="label">覆盖领域</div></div>
        <div class="overview-card"><div class="num">${PAPERS_DB.filter(p=>p.highlight).length}</div><div class="label">重磅论文</div></div>
    </div>`;
    categoryOrder.forEach(cat => {
        const catPapers = PAPERS_DB.filter(p => p.category === cat);
        if (catPapers.length === 0) return;
        catPapers.sort((a, b) => b.addedDate.localeCompare(a.addedDate));
        const icon = catPapers[0].categoryIcon;
        html += renderSectionTitle(cat, icon, catPapers.length);
        catPapers.forEach(p => html += renderPaperCard(p));
    });
    return html;
}

function renderDateViewHtml(date) {
    const papers = PAPERS_DB.filter(p => p.addedDate === date);
    let html = "";
    categoryOrder.forEach(cat => {
        const catPapers = papers.filter(p => p.category === cat);
        if (catPapers.length === 0) return;
        html += renderSectionTitle(cat, catPapers[0].categoryIcon, catPapers.length);
        catPapers.forEach(p => html += renderPaperCard(p));
    });
    return html;
}

function renderCategoryViewHtml(category) {
    const papers = PAPERS_DB.filter(p => p.category === category);
    papers.sort((a, b) => b.addedDate.localeCompare(a.addedDate));
    let html = `<div class="overview-cards">
        <div class="overview-card"><div class="num">${papers.length}</div><div class="label">该领域论文</div></div>
        <div class="overview-card"><div class="num">${papers.filter(p=>p.highlight).length}</div><div class="label">重磅论文</div></div>
    </div>`;
    papers.forEach(p => html += renderPaperCard(p));
    return html;
}

function renderSearchResultsHtml() {
    const q = searchQuery.toLowerCase();
    const results = PAPERS_DB.filter(p =>
        p.title.toLowerCase().includes(q) ||
        p.summary.toLowerCase().includes(q) ||
        p.category.toLowerCase().includes(q) ||
        p.venue.toLowerCase().includes(q) ||
        p.innovations.some(i => i.toLowerCase().includes(q)) ||
        p.tags.some(t => t[0].toLowerCase().includes(q)) ||
        (p.bossNotes && p.bossNotes.toLowerCase().includes(q))
    );
    if (results.length === 0) {
        return `<div class="empty-state">
            <div class="icon">🔍</div>
            <h3>没有找到匹配的论文</h3>
            <p>试试其他关键词，如 "force"、"VLA"、"MoE"</p>
        </div>`;
    }
    let html = `<div style="margin-bottom:20px;font-size:14px;color:var(--text-dim)">
        找到 <strong style="color:var(--accent)">${results.length}</strong> 条匹配结果
    </div>`;
    results.forEach(p => html += renderPaperCard(p, q));
    return html;
}

// ===== Ideas 视图 =====
function renderIdeasOverviewHtml() {
    const statusCounts = {};
    IDEAS_DB.forEach(i => { statusCounts[i.status] = (statusCounts[i.status] || 0) + 1; });
    const ideaTags = [...new Set(IDEAS_DB.flatMap(i => i.tags.map(t => t[0])))];

    let html = `<div class="overview-cards ideas-accent">
        <div class="overview-card"><div class="num">${IDEAS_DB.length}</div><div class="label">灵感总数</div></div>
        <div class="overview-card"><div class="num">${statusCounts['new'] || 0}</div><div class="label">💡 New</div></div>
        <div class="overview-card"><div class="num">${statusCounts['exploring'] || 0}</div><div class="label">🔬 Exploring</div></div>
        <div class="overview-card"><div class="num">${ideaTags.length}</div><div class="label">涉及标签</div></div>
    </div>`;
    html += `<div class="section-title" style="color:#7c3aed"><span class="icon">⚡</span> 最新灵感</div>`;
    const recentIdeas = [...IDEAS_DB].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5);
    recentIdeas.forEach(i => html += renderIdeaCard(i));
    return html;
}

function renderAllIdeasHtml() {
    const sorted = [...IDEAS_DB].sort((a, b) => b.date.localeCompare(a.date));
    let html = `<div class="overview-cards ideas-accent">
        <div class="overview-card"><div class="num">${IDEAS_DB.length}</div><div class="label">灵感总数</div></div>
    </div>`;
    sorted.forEach(i => html += renderIdeaCard(i));
    return html;
}

function renderIdeaStatusViewHtml(status) {
    const ideas = IDEAS_DB.filter(i => i.status === status);
    ideas.sort((a, b) => b.date.localeCompare(a.date));
    let html = `<div class="overview-cards ideas-accent">
        <div class="overview-card"><div class="num">${ideas.length}</div><div class="label">该状态灵感</div></div>
    </div>`;
    ideas.forEach(i => html += renderIdeaCard(i));
    return html;
}

function renderIdeaDateViewHtml(date) {
    const ideas = IDEAS_DB.filter(i => i.date === date);
    let html = "";
    ideas.forEach(i => html += renderIdeaCard(i));
    return html;
}

function renderIdeaSearchResultsHtml() {
    const q = searchQuery.toLowerCase();
    const results = IDEAS_DB.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.content.toLowerCase().includes(q) ||
        i.tags.some(t => t[0].toLowerCase().includes(q)) ||
        i.sources.some(s => s.title.toLowerCase().includes(q))
    );
    if (results.length === 0) {
        return `<div class="empty-state">
            <div class="icon">🔍</div>
            <h3>没有找到匹配的灵感</h3>
            <p>试试其他关键词，如 "RL"、"表示"、"representation"</p>
        </div>`;
    }
    let html = `<div style="margin-bottom:20px;font-size:14px;color:var(--text-dim)">
        找到 <strong style="color:#7c3aed">${results.length}</strong> 条匹配结果
    </div>`;
    results.forEach(i => html += renderIdeaCard(i, q));
    return html;
}

// ===== 渲染辅助 =====
function renderSectionTitle(cat, icon, count) {
    return `<div class="section-title">
        <span class="icon">${icon}</span> ${cat}
        <span style="margin-left:auto;font-size:11px;color:var(--text-muted);letter-spacing:0;text-transform:none">${count} 篇</span>
    </div>`;
}

function renderPaperCard(paper, highlightQuery) {
    const cls = paper.highlight ? "paper highlight" : "paper";
    let summary = paper.summary;
    let title = paper.title;

    if (highlightQuery) {
        const re = new RegExp(`(${escapeRegex(highlightQuery)})`, "gi");
        summary = summary.replace(re, "<mark>$1</mark>");
        title = title.replace(re, "<mark>$1</mark>");
    }

    const tagsHtml = paper.tags.map(([label, color]) => {
        const cls = color === "red" ? "tag-red" : color === "yellow" ? "tag-yellow" : color === "blue" ? "tag-blue" : color === "teal" ? "tag-teal" : "tag-green";
        return `<span class="tag ${cls}">${label}</span>`;
    }).join("");

    const linksHtml = paper.links.map(([label, url]) =>
        `<a href="${url}" target="_blank">${label}</a>`
    ).join("");

    let innovationsHtml = "";
    if (paper.innovations && paper.innovations.length > 0) {
        let items = paper.innovations.map(i => {
            let text = i;
            if (highlightQuery) {
                const re = new RegExp(`(${escapeRegex(highlightQuery)})`, "gi");
                text = text.replace(re, "<mark>$1</mark>");
            }
            return `<li>${text}</li>`;
        }).join("");
        innovationsHtml = `<div class="innovations">
            <div class="innovations-title">💡 核心创新点</div>
            <ul>${items}</ul>
        </div>`;
    }

    let metaHtml = `<div class="meta-row">`;
    if (paper.authors) metaHtml += `<span>👤 ${paper.authors}</span>`;
    metaHtml += `<span>📅 收录于 ${paper.addedDate}</span>`;
    metaHtml += `</div>`;

    let resultsHtml = "";
    if (paper.results) {
        resultsHtml = `<div style="font-size:13.5px;color:var(--green);margin-bottom:10px;padding:8px 12px;background:rgba(5,150,105,0.05);border-radius:6px;border:1px solid rgba(5,150,105,0.12)">
            📊 <strong>效果：</strong>${paper.results}
        </div>`;
    }

    let notesHtml = "";
    if (paper.bossNotes) {
        notesHtml = `<div style="font-size:13px;color:var(--yellow);margin-bottom:10px;padding:8px 12px;background:rgba(217,119,6,0.05);border-radius:6px;border:1px solid rgba(217,119,6,0.12)">
            📝 <strong>Boss 备注：</strong>${paper.bossNotes}
        </div>`;
    }

    return `<div class="${cls}">
        <div class="tags">${tagsHtml}</div>
        <h3>${title}</h3>
        <div class="venue">${paper.venue}</div>
        ${metaHtml}
        <div class="summary">${summary}</div>
        ${innovationsHtml}
        ${resultsHtml}
        ${notesHtml}
        <div class="links">${linksHtml}</div>
    </div>`;
}

function renderIdeaCard(idea, highlightQuery) {
    const statusInfo = ideaStatusMap[idea.status] || ideaStatusMap["new"];
    let title = idea.title;
    let contentText = idea.content.replace(/\n/g, '<br>');

    if (highlightQuery) {
        const re = new RegExp(`(${escapeRegex(highlightQuery)})`, "gi");
        title = title.replace(re, "<mark>$1</mark>");
        contentText = contentText.replace(re, "<mark>$1</mark>");
    }

    const tagsHtml = idea.tags.map(([label, color]) => {
        const cls = color === "red" ? "tag-red" : color === "yellow" ? "tag-yellow" : color === "blue" ? "tag-blue" : color === "teal" ? "tag-teal" : color === "purple" ? "tag-purple" : color === "indigo" ? "tag-indigo" : "tag-green";
        return `<span class="tag ${cls}">${label}</span>`;
    }).join("");

    let sourcesHtml = "";
    if (idea.sources && idea.sources.length > 0) {
        const sourceItems = idea.sources.map(s => {
            const typeIcon = s.type === "paper" ? "📄" : s.type === "pdf" ? "📑" : s.type === "project" ? "🌐" : "🔗";
            return `<div class="idea-source-item">${typeIcon} <a href="${s.url}" target="_blank">${s.title}</a></div>`;
        }).join("");
        sourcesHtml = `<div class="idea-source">
            <div class="idea-source-title">🔗 启发来源</div>
            ${sourceItems}
        </div>`;
    }

    return `<div class="idea">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span class="idea-status ${statusInfo.cls}">${statusInfo.label}</span>
            <div class="tags" style="margin-bottom:0">${tagsHtml}</div>
        </div>
        <h3>${title}</h3>
        <div class="idea-meta">
            <span>📅 ${idea.date}</span>
        </div>
        <div class="idea-content">${contentText}</div>
        ${sourcesHtml}
    </div>`;
}

// ===== 搜索功能 =====
function setupSearch() {
    const input = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    let debounceTimer;

    input.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        const val = input.value.trim();
        clearBtn.classList.toggle("visible", val.length > 0);
        debounceTimer = setTimeout(() => {
            if (val.length > 0) {
                searchQuery = val;
                currentView = "search";
                renderSidebar();
                renderView();
                updateStatsBadge();
            } else if (searchQuery) {
                searchQuery = "";
                currentView = "overview";
                renderSidebar();
                renderView();
                updateStatsBadge();
            }
        }, 250);
    });
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    searchQuery = "";
    currentView = "overview";
    renderSidebar();
    renderView();
    updateStatsBadge();
    document.getElementById("searchInput").focus();
}

function setupKeyboard() {
    document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
            e.preventDefault();
            document.getElementById("searchInput").focus();
        }
        if (e.key === "Escape") {
            document.getElementById("searchInput").blur();
            if (searchQuery) clearSearch();
        }
    });
}

// ===== 工具函数 =====
function formatDateLabel(dateStr, forIdeas) {
    const d = new Date(dateStr + "T00:00:00");
    const weekdays = ["日","一","二","三","四","五","六"];
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = weekdays[d.getDay()];
    const refDates = forIdeas ? [...new Set(IDEAS_DB.map(i => i.date))].sort().reverse() : allDates;
    if (dateStr === refDates[0]) return `${m}/${day}（周${w}）· 最新`;
    return `${m}/${day}（周${w}）`;
}

function updateStatsBadge() {
    const badge = document.getElementById("statsBadge");
    if (searchQuery) {
        if (activeTab === "papers") {
            const count = PAPERS_DB.filter(p =>
                p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.innovations.some(i => i.toLowerCase().includes(searchQuery.toLowerCase()))
            ).length;
            badge.textContent = `${count} 条结果`;
        } else {
            const count = IDEAS_DB.filter(i =>
                i.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                i.content.toLowerCase().includes(searchQuery.toLowerCase())
            ).length;
            badge.textContent = `${count} 条结果`;
        }
    } else {
        if (activeTab === "papers") {
            badge.textContent = `共 ${PAPERS_DB.length} 篇精读`;
        } else {
            badge.textContent = `共 ${IDEAS_DB.length} 条灵感`;
        }
    }
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebarOverlay").classList.toggle("open");
}
</script>
