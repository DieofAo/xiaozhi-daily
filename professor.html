<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Professor 知识库 — Boss Team Research</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-card: #ffffff;
            --bg-hover: #f3f4f6;
            --border: #e5e7eb;
            --border-hover: #0d9488;
            --text: #1a1a2e;
            --text-dim: #4a4a6a;
            --text-muted: #9ca3af;
            --accent: #0d9488;
            --accent-light: #0f766e;
            --accent-bg: rgba(13,148,136,0.05);
            --accent-border: rgba(13,148,136,0.15);
            --green: #059669;
            --yellow: #d97706;
            --red: #dc2626;
            --radius: 10px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            line-height: 1.8;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        .app { display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid var(--border);
            position: fixed;
            top: 0; left: 0; bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .sidebar-header {
            padding: 24px 20px 18px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .sidebar-nav { padding: 10px; }
        .nav-section { margin-bottom: 6px; }
        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 10px 10px 6px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 14px;
            color: var(--text-dim);
            user-select: none;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: var(--bg-secondary); color: var(--text); }
        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            border-color: var(--accent-border);
            font-weight: 500;
        }
        .nav-item .icon { font-size: 15px; width: 20px; text-align: center; }
        .nav-item .count {
            margin-left: auto;
            font-size: 11px;
            background: var(--bg-secondary);
            padding: 1px 8px;
            border-radius: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .nav-item.active .count {
            background: rgba(13,148,136,0.1);
            color: var(--accent);
        }

        /* Main */
        .main { margin-left: 280px; flex: 1; min-height: 100vh; }

        /* Topbar */
        .topbar {
            position: sticky; top: 0; z-index: 50;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .topbar-title { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; }
        .search-box { flex: 1; max-width: 460px; position: relative; }
        .search-box input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        .search-box input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box .search-icon {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            font-size: 14px; color: var(--text-muted);
        }
        .search-box .clear-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 16px; display: none; padding: 2px 4px;
        }
        .search-box .clear-btn.visible { display: block; }
        .stats-badge {
            font-size: 12px; color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 6px 14px; border-radius: 20px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .kbd-hint {
            font-size: 11px; color: var(--text-muted);
            border: 1px solid var(--border); padding: 2px 6px;
            border-radius: 4px; background: var(--bg-secondary);
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        }
        .search-box input:focus ~ .kbd-hint,
        .search-box .clear-btn.visible ~ .kbd-hint { display: none; }

        /* Content */
        .content { padding: 28px 40px; }

        /* Overview cards */
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px; margin-bottom: 32px;
        }
        .overview-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px; text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .overview-card .num { font-size: 30px; font-weight: 700; color: var(--accent); }
        .overview-card .label { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }

        /* Section title */
        .section-title {
            font-size: 12px; font-weight: 600; color: var(--accent);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 28px 0 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title .icon { font-size: 16px; }

        /* Paper card */
        .paper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 26px; margin-bottom: 14px;
            transition: all 0.2s ease;
            cursor: default;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }
        .paper:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .paper.highlight {
            background: linear-gradient(135deg, rgba(13,148,136,0.03) 0%, rgba(5,150,105,0.02) 100%);
            border-left: 3px solid var(--accent);
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .paper:nth-child(1) { animation-delay: 0s; }
        .paper:nth-child(2) { animation-delay: 0.04s; }
        .paper:nth-child(3) { animation-delay: 0.08s; }
        .paper:nth-child(4) { animation-delay: 0.12s; }
        .paper:nth-child(5) { animation-delay: 0.16s; }

        .paper h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.55; }
        .paper .venue { font-size: 12.5px; color: var(--accent); margin-bottom: 8px; font-weight: 500; }
        .paper .meta-row {
            display: flex; gap: 12px; flex-wrap: wrap;
            font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
        }
        .paper .meta-row span { display: flex; align-items: center; gap: 4px; }

        /* Innovation points */
        .innovations {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 18px;
            margin-bottom: 14px;
        }
        .innovations-title {
            font-size: 12px; font-weight: 600; color: var(--accent);
            margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
        }
        .innovations ul {
            list-style: none; padding: 0;
        }
        .innovations li {
            font-size: 14px; color: var(--text-dim);
            line-height: 1.75; padding: 3px 0;
            padding-left: 18px; position: relative;
        }
        .innovations li::before {
            content: "▸"; position: absolute; left: 0;
            color: var(--accent); font-weight: bold;
        }

        .paper .summary {
            font-size: 14.5px; color: var(--text-dim);
            line-height: 1.85; margin-bottom: 14px;
        }
        .paper .summary mark {
            background: rgba(245,158,11,0.18);
            color: #92400e; padding: 1px 4px; border-radius: 3px;
        }

        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            display: inline-block; font-size: 11px;
            padding: 2px 9px; border-radius: 4px; font-weight: 500;
        }
        .tag-green { color: var(--green); background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.18); }
        .tag-yellow { color: var(--yellow); background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.18); }
        .tag-red { color: var(--red); background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.15); }
        .tag-blue { color: #2563eb; background: rgba(37,99,235,0.06); border: 1px solid rgba(37,99,235,0.15); }
        .tag-teal { color: var(--accent); background: var(--accent-bg); border: 1px solid var(--accent-border); }

        .links { display: flex; gap: 8px; flex-wrap: wrap; }
        .links a {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12.5px; color: var(--accent); text-decoration: none;
            padding: 5px 13px; border-radius: 6px;
            background: var(--accent-bg);
            border: 1px solid var(--accent-border);
            transition: all 0.15s ease; font-weight: 500;
        }
        .links a:hover {
            background: rgba(13,148,136,0.1);
            border-color: rgba(13,148,136,0.25);
        }

        /* Empty state */
        .empty-state { text-align: center; padding: 80px 32px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-dim); margin-bottom: 8px; }

        /* Top Tabs */
        .top-tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
        }
        .top-tab {
            padding: 12px 28px;
            font-size: 14.5px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-tab:hover { color: var(--text-dim); }
        .top-tab.active-papers {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .top-tab.active-ideas {
            color: #7c3aed;
            border-bottom-color: #7c3aed;
        }
        .top-tab .tab-count {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .top-tab.active-papers .tab-count {
            background: rgba(13,148,136,0.1);
            color: var(--accent);
        }
        .top-tab.active-ideas .tab-count {
            background: rgba(124,58,237,0.1);
            color: #7c3aed;
        }

        /* Idea card */
        .idea {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 26px; margin-bottom: 14px;
            transition: all 0.2s ease;
            cursor: default;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
            border-left: 3px solid #7c3aed;
        }
        .idea:hover {
            border-color: #7c3aed;
            border-left-color: #7c3aed;
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .idea:nth-child(1) { animation-delay: 0s; }
        .idea:nth-child(2) { animation-delay: 0.04s; }
        .idea:nth-child(3) { animation-delay: 0.08s; }

        .idea h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.55; }
        .idea .idea-meta {
            display: flex; gap: 12px; flex-wrap: wrap;
            font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
        }
        .idea .idea-meta span { display: flex; align-items: center; gap: 4px; }
        .idea .idea-content {
            font-size: 14.5px; color: var(--text-dim);
            line-height: 1.85; margin-bottom: 14px;
        }
        .idea .idea-content mark {
            background: rgba(124,58,237,0.12);
            color: #5b21b6; padding: 1px 4px; border-radius: 3px;
        }

        /* Idea status badge */
        .idea-status {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: 600;
            padding: 3px 12px; border-radius: 20px;
            margin-bottom: 10px;
        }
        .idea-status-new { background: rgba(124,58,237,0.08); color: #7c3aed; border: 1px solid rgba(124,58,237,0.2); }
        .idea-status-exploring { background: rgba(37,99,235,0.08); color: #2563eb; border: 1px solid rgba(37,99,235,0.2); }
        .idea-status-validated { background: rgba(5,150,105,0.08); color: #059669; border: 1px solid rgba(5,150,105,0.2); }
        .idea-status-abandoned { background: rgba(107,114,128,0.08); color: #6b7280; border: 1px solid rgba(107,114,128,0.2); }

        /* Idea source box */
        .idea-source {
            background: rgba(124,58,237,0.04);
            border: 1px solid rgba(124,58,237,0.12);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 14px;
        }
        .idea-source-title {
            font-size: 12px; font-weight: 600; color: #7c3aed;
            margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
        }
        .idea-source-item {
            font-size: 13.5px; color: var(--text-dim);
            line-height: 1.7; padding: 2px 0;
        }
        .idea-source-item a {
            color: #7c3aed; text-decoration: none;
            border-bottom: 1px dashed rgba(124,58,237,0.3);
        }
        .idea-source-item a:hover { border-bottom-color: #7c3aed; }

        /* Idea tags — purple scheme */
        .tag-purple { color: #7c3aed; background: rgba(124,58,237,0.06); border: 1px solid rgba(124,58,237,0.15); }
        .tag-indigo { color: #4f46e5; background: rgba(79,70,229,0.06); border: 1px solid rgba(79,70,229,0.15); }

        /* Ideas overview accent override */
        .ideas-accent .overview-card .num { color: #7c3aed; }

        /* ===== Project Module ===== */
        .project-hero {
            background: linear-gradient(135deg, #0d9488 0%, #059669 50%, #0284c7 100%);
            border-radius: var(--radius);
            padding: 32px 36px;
            margin-bottom: 24px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .project-hero::before {
            content: "";
            position: absolute; right: -40px; top: -40px;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .project-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .project-hero .subtitle { font-size: 14px; opacity: 0.85; margin-bottom: 16px; }
        .project-hero .status-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .project-hero .status-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.18); padding: 5px 14px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .project-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 18px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        .project-section-header {
            display: flex; align-items: center; gap: 10px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .project-section-header:hover { background: var(--bg-secondary); }
        .project-section-header .icon { font-size: 18px; }
        .project-section-header h3 { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
        .project-section-header .toggle { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
        .project-section-header .toggle.collapsed { transform: rotate(-90deg); }
        .project-section-body { padding: 20px 24px; }
        .project-section-body.collapsed { display: none; }

        .project-section-body p {
            font-size: 14.5px; color: var(--text-dim); line-height: 1.85; margin-bottom: 12px;
        }
        .project-section-body ul {
            list-style: none; padding: 0; margin-bottom: 12px;
        }
        .project-section-body li {
            font-size: 14px; color: var(--text-dim); line-height: 1.8;
            padding: 4px 0 4px 20px; position: relative;
        }
        .project-section-body li::before {
            content: "▸"; position: absolute; left: 0;
            color: var(--accent); font-weight: bold;
        }
        .project-section-body code {
            background: var(--bg-secondary); padding: 1px 6px;
            border-radius: 4px; font-size: 13px; color: #c7254e;
            border: 1px solid var(--border);
        }
        .project-section-body strong { color: var(--text); }

        /* Roadmap timeline */
        .roadmap-phase {
            display: flex; gap: 16px; margin-bottom: 18px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
            position: relative;
        }
        .roadmap-phase.phase-done { border-left-color: var(--green); }
        .roadmap-phase.phase-active { border-left-color: #2563eb; background: rgba(37,99,235,0.04); }
        .roadmap-phase.phase-future { border-left-color: var(--text-muted); opacity: 0.75; }
        .roadmap-phase .phase-num {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
            background: var(--accent); color: #fff;
        }
        .roadmap-phase.phase-done .phase-num { background: var(--green); }
        .roadmap-phase.phase-active .phase-num { background: #2563eb; }
        .roadmap-phase.phase-future .phase-num { background: var(--text-muted); }
        .roadmap-phase .phase-content { flex: 1; }
        .roadmap-phase .phase-title { font-size: 14.5px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .roadmap-phase .phase-desc { font-size: 13.5px; color: var(--text-dim); line-height: 1.7; }

        /* Methods comparison */
        .method-card {
            border: 1px solid var(--border); border-radius: 8px;
            padding: 16px 20px; margin-bottom: 12px;
            transition: all 0.15s;
        }
        .method-card:hover { border-color: var(--border-hover); }
        .method-card .method-name { font-size: 14.5px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .method-card .method-year { font-size: 12px; color: var(--accent); font-weight: 500; margin-bottom: 6px; }
        .method-card .method-desc { font-size: 13.5px; color: var(--text-dim); line-height: 1.7; margin-bottom: 8px; }
        .method-card .method-pros-cons { display: flex; gap: 16px; font-size: 12.5px; }
        .method-card .pros { color: var(--green); }
        .method-card .cons { color: var(--red); }

        /* Tips */
        .tip-item {
            padding: 14px 18px; margin-bottom: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .tip-item .tip-label {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .tip-label-engineering { color: #2563eb; }
        .tip-label-theory { color: #7c3aed; }
        .tip-label-pitfall { color: var(--red); }
        .tip-label-insight { color: var(--yellow); }
        .tip-item .tip-text { font-size: 14px; color: var(--text-dim); line-height: 1.75; }

        /* Changelog */
        .changelog-entry {
            display: flex; gap: 14px; padding: 10px 0;
            border-bottom: 1px solid rgba(229,231,235,0.5);
        }
        .changelog-entry:last-child { border-bottom: none; }
        .changelog-date {
            font-size: 12px; color: var(--accent); font-weight: 600;
            white-space: nowrap; min-width: 80px; padding-top: 2px;
        }
        .changelog-text { font-size: 13.5px; color: var(--text-dim); line-height: 1.7; }

        /* Paper ref in project */
        .paper-ref {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; margin-bottom: 8px;
            background: var(--bg-secondary); border-radius: 8px;
            border: 1px solid var(--border);
            transition: all 0.15s; cursor: pointer;
        }
        .paper-ref:hover { border-color: var(--border-hover); background: var(--bg-hover); }
        .paper-ref .ref-icon { font-size: 16px; }
        .paper-ref .ref-title { font-size: 13.5px; color: var(--text); font-weight: 500; flex: 1; }
        .paper-ref .ref-year { font-size: 11px; color: var(--text-muted); }

        /* Project nav active */
        .top-tab.active-projects {
            color: #059669;
            border-bottom-color: #059669;
        }
        .top-tab.active-projects .tab-count {
            background: rgba(5,150,105,0.1);
            color: #059669;
        }
        .projects-accent .overview-card .num { color: #059669; }

        /* Mobile */
        .hamburger {
            display: none; background: none; border: none;
            color: var(--text); font-size: 22px; cursor: pointer; padding: 4px;
        }
        .sidebar-overlay {

            <div class="nav-item ${currentView==='overview'?'active':''}" onclick="setView('overview')">

            </div>
            <div class="nav-item ${currentView==='all'?'active':''}" onclick="setView('all')">
                <span class="icon">📚</span> 全部论文

        html += `<div class="nav-section">
            <div class="nav-section-title">按领域</div>`;
        categoryOrder.forEach(cat => {
            const papers = PAPERS_DB.filter(p => p.category === cat);
            if (papers.length === 0) return;
            const icon = papers[0].categoryIcon;
            const active = currentView === `category:${cat}`;
            html += `<div class="nav-item ${active?'active':''}" onclick="setView('category:${cat}')">
                <span class="icon">${icon}</span> ${cat}
                <span class="count">${papers.length}</span>
            </div>`;
        });
        html += `</div>`;

        html += `<div class="nav-section">
            <div class="nav-section-title">按收录日期</div>`;
        allDates.forEach(d => {
            const papers = PAPERS_DB.filter(p => p.addedDate === d);
            const isLatest = d === allDates[0];
            const label = formatDateLabel(d);

            html += `<div class="nav-item ${active?'active':''}" onclick="setView('date:${d}')">

            <div class="nav-section-title">快速访问</div>

function renderView() {
    const content = document.getElementById("content");
    const title = document.getElementById("topbarTitle");

    // Top tabs
    let tabsHtml = `<div class="top-tabs">
        <div class="top-tab ${activeTab==='projects'?'active-projects':''}" onclick="switchTab('projects')">
            🔬 Projects
            <span class="tab-count">${PROJECTS_DB.length}</span>
        </div>
        <div class="top-tab ${activeTab==='papers'?'active-papers':''}" onclick="switchTab('papers')">
            📚 Papers
            <span class="tab-count">${PAPERS_DB.length}</span>
        </div>
        <div class="top-tab ${activeTab==='ideas'?'active-ideas':''}" onclick="switchTab('ideas')">
            💡 Ideas
            <span class="tab-count">${IDEAS_DB.length}</span>
        </div>
    </div>`;

    if (searchQuery) {
        title.textContent = `搜索: "${searchQuery}"`;
        if (activeTab === "projects") {
            content.innerHTML = tabsHtml + renderProjectSearchResultsHtml();
        } else if (activeTab === "papers") {
            content.innerHTML = tabsHtml + renderSearchResultsHtml();
        } else {
            content.innerHTML = tabsHtml + renderIdeaSearchResultsHtml();
        }
        return;
    }

    if (activeTab === "projects") {
        switch (true) {
            case currentView === "overview":
                title.textContent = "🔬 研究项目";
                content.innerHTML = tabsHtml + renderProjectsOverviewHtml();
                break;
            case currentView.startsWith("project:"):
                const projId = currentView.split(":").slice(1).join(":");
                const proj = PROJECTS_DB.find(p => p.id === projId);
                if (proj) {
                    title.textContent = `${proj.icon} ${proj.title}`;
                    content.innerHTML = tabsHtml + renderProjectDetailHtml(proj);
                }
                break;
        }
    } else if (activeTab === "papers") {
        switch (true) {
            case currentView === "overview":
                title.textContent = "🎓 知识库概览";
                content.innerHTML = tabsHtml + renderPapersOverviewHtml();
                break;
            case currentView === "all":
                title.textContent = "📚 全部论文";
                content.innerHTML = tabsHtml + renderAllPapersHtml();
                break;
            case currentView.startsWith("date:"):
                const date = currentView.split(":")[1];
                title.textContent = `📅 ${formatDateLabel(date)}`;
                content.innerHTML = tabsHtml + renderDateViewHtml(date);
                break;
            case currentView.startsWith("category:"):
                const cat = currentView.split(":").slice(1).join(":");
                const icon = PAPERS_DB.find(p => p.category === cat)?.categoryIcon || '📂';
                title.textContent = `${icon} ${cat}`;
                content.innerHTML = tabsHtml + renderCategoryViewHtml(cat);
                break;
        }
    } else {
        switch (true) {
            case currentView === "overview":
                title.textContent = "✨ 灵感概览";
                content.innerHTML = tabsHtml + renderIdeasOverviewHtml();
                break;
            case currentView === "all-ideas":
                title.textContent = "💡 全部灵感";
                content.innerHTML = tabsHtml + renderAllIdeasHtml();
                break;
            case currentView.startsWith("idea-status:"):
                const status = currentView.split(":")[1];
                const statusInfo = ideaStatusMap[status];
                title.textContent = `${statusInfo.label}`;
                content.innerHTML = tabsHtml + renderIdeaStatusViewHtml(status);
                break;
            case currentView.startsWith("idea-date:"):
                const ideaDate = currentView.split(":")[1];
                title.textContent = `📅 ${formatDateLabel(ideaDate, true)}`;
                content.innerHTML = tabsHtml + renderIdeaDateViewHtml(ideaDate);
                break;
        }
    }
}

// ===== 渲染辅助 =====
function renderSectionTitle(cat, icon, count) {
    return `<div class="section-title">
        <span class="icon">${icon}</span> ${cat}
        <span style="margin-left:auto;font-size:11px;color:var(--text-muted);letter-spacing:0;text-transform:none">${count} 篇</span>
    </div>`;

function renderPaperCard(paper, highlightQuery) {
    const cls = paper.highlight ? "paper highlight" : "paper";
    let summary = paper.summary;
    let title = paper.title;

    if (highlightQuery) {
        const re = new RegExp(`(${escapeRegex(highlightQuery)})`, "gi");
        summary = summary.replace(re, "<mark>$1</mark>");
        title = title.replace(re, "<mark>$1</mark>");
    }

    const tagsHtml = paper.tags.map(([label, color]) => {
        const cls = color === "red" ? "tag-red" : color === "yellow" ? "tag-yellow" : color === "blue" ? "tag-blue" : color === "teal" ? "tag-teal" : "tag-green";
        return `<span class="tag ${cls}">${label}</span>`;
    }).join("");

    const linksHtml = paper.links.map(([label, url]) =>
        `<a href="${url}" target="_blank">${label}</a>`
    ).join("");

    let innovationsHtml = "";
    if (paper.innovations && paper.innovations.length > 0) {
        let items = paper.innovations.map(i => {
            let text = i;
            if (highlightQuery) {
                const re = new RegExp(`(${escapeRegex(highlightQuery)})`, "gi");
                text = text.replace(re, "<mark>$1</mark>");
            }
            return `<li>${text}</li>`;
        }).join("");
        innovationsHtml = `<div class="innovations">
            <div class="innovations-title">💡 核心创新点</div>
            <ul>${items}</ul>
        </div>`;
    }

    let metaHtml = `<div class="meta-row">`;
    if (paper.authors) metaHtml += `<span>👤 ${paper.authors}</span>`;
    metaHtml += `<span>📅 收录于 ${paper.addedDate}</span>`;
    metaHtml += `</div>`;

    let resultsHtml = "";
    if (paper.results) {
        resultsHtml = `<div style="font-size:13.5px;color:var(--green);margin-bottom:10px;padding:8px 12px;background:rgba(5,150,105,0.05);border-radius:6px;border:1px solid rgba(5,150,105,0.12)">
            📊 <strong>效果：</strong>${paper.results}
        </div>`;
    }

    let notesHtml = "";
    if (paper.bossNotes) {
        notesHtml = `<div style="font-size:13px;color:var(--yellow);margin-bottom:10px;padding:8px 12px;background:rgba(217,119,6,0.05);border-radius:6px;border:1px solid rgba(217,119,6,0.12)">
            📝 <strong>Boss 备注：</strong>${paper.bossNotes}
        </div>`;
    }

    return `<div class="${cls}">
        <div class="tags">${tagsHtml}</div>
        <h3>${title}</h3>
        <div class="venue">${paper.venue}</div>
        ${metaHtml}
        <div class="summary">${summary}</div>
        ${innovationsHtml}
        ${resultsHtml}
        ${notesHtml}
        <div class="links">${linksHtml}</div>
    </div>`;
}

    if (idea.sources && idea.sources.length > 0) {
        const sourceItems = idea.sources.map(s => {
            const typeIcon = s.type === "paper" ? "📄" : s.type === "pdf" ? "📑" : s.type === "project" ? "🌐" : "🔗";
            return `<div class="idea-source-item">${typeIcon} <a href="${s.url}" target="_blank">${s.title}</a></div>`;
        }).join("");
        sourcesHtml = `<div class="idea-source">
            <div class="idea-source-title">🔗 启发来源</div>
            ${sourceItems}
        </div>`;
    }

    return `<div class="idea">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span class="idea-status ${statusInfo.cls}">${statusInfo.label}</span>
            <div class="tags" style="margin-bottom:0">${tagsHtml}</div>
        </div>
        <h3>${title}</h3>
        <div class="idea-meta">
            <span>📅 ${idea.date}</span>
        </div>
        <div class="idea-content">${contentText}</div>
        ${sourcesHtml}
    </div>`;
}

// ===== 搜索功能 =====
function setupSearch() {
    const input = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    let debounceTimer;

    input.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        const val = input.value.trim();
        clearBtn.classList.toggle("visible", val.length > 0);
        debounceTimer = setTimeout(() => {
            if (val.length > 0) {
                searchQuery = val;
                currentView = "search";
                renderSidebar();
                renderView();
                updateStatsBadge();
            } else if (searchQuery) {
                searchQuery = "";
                currentView = "overview";
                renderSidebar();
                renderView();
                updateStatsBadge();
            }
        }, 250);
    });
}

function clearSearch() {
    document.getElementById("searchInput").value = "";
    document.getElementById("clearBtn").classList.remove("visible");
    searchQuery = "";
    currentView = "overview";
    renderSidebar();
    renderView();
    updateStatsBadge();
    document.getElementById("searchInput").focus();
}

function setupKeyboard() {
    document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
            e.preventDefault();
            document.getElementById("searchInput").focus();
        }
        if (e.key === "Escape") {
            document.getElementById("searchInput").blur();
            if (searchQuery) clearSearch();
        }
    });
}

// ===== 工具函数 =====
function formatDateLabel(dateStr, forIdeas) {
    const d = new Date(dateStr + "T00:00:00");
    const weekdays = ["日","一","二","三","四","五","六"];
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const w = weekdays[d.getDay()];
    const refDates = forIdeas ? [...new Set(IDEAS_DB.map(i => i.date))].sort().reverse() : allDates;
    if (dateStr === refDates[0]) return `${m}/${day}（周${w}）· 最新`;
    return `${m}/${day}（周${w}）`;
}

function updateStatsBadge() {
    const badge = document.getElementById("statsBadge");
    if (searchQuery) {
        if (activeTab === "projects") {
            const count = PROJECTS_DB.filter(p =>
                p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.subtitle.toLowerCase().includes(searchQuery.toLowerCase())
            ).length;
            badge.textContent = `${count} 个项目`;
        } else if (activeTab === "papers") {
            const count = PAPERS_DB.filter(p =>
                p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.innovations.some(i => i.toLowerCase().includes(searchQuery.toLowerCase()))
            ).length;
            badge.textContent = `${count} 条结果`;
        } else {
            const count = IDEAS_DB.filter(i =>
                i.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                i.content.toLowerCase().includes(searchQuery.toLowerCase())
            ).length;
            badge.textContent = `${count} 条结果`;
        }
    } else {
        if (activeTab === "projects") {
            badge.textContent = `共 ${PROJECTS_DB.length} 个项目`;
        } else if (activeTab === "papers") {
            badge.textContent = `共 ${PAPERS_DB.length} 篇精读`;
        } else {
            badge.textContent = `共 ${IDEAS_DB.length} 条灵感`;
        }
    }
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebarOverlay").classList.toggle("open");
}
